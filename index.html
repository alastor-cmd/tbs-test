<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>ATM TBS · Ощадбанк</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg:#f5f5f4; --surface:#fff; --border:#d6d3d1; --border-strong:#a8a29e;
  --text:#1c1917; --text-muted:#57534e; --accent:#1e40af; --accent-hover:#1e3a8a;
  --warn:#b91c1c; --warn-bg:#fee2e2; --warn-soft:#fef3c7; --ok:#15803d;
  --highlight:#fef9c3; --row-hover:#fafaf9; --info:#0369a1;
}
*{box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);margin:0;padding:0;font-size:13px;line-height:1.4;}



/* ===== LOGIN PAGE ===== */
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1e3a5f 0%,#1e40af 100%);}
.login-card{background:#fff;border-radius:12px;padding:40px 48px;width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.login-logo{text-align:center;margin-bottom:20px;}
.login-title{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--text-muted);text-align:center;margin-bottom:24px;}
.login-field{margin-bottom:14px;}
.login-field label{display:block;font-size:11px;font-weight:600;margin-bottom:5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;}
.login-field input{width:100%;padding:10px 14px;border:1px solid var(--border-strong);border-radius:6px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;}
.login-field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(30,64,175,.1);}
.login-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px;}
.login-btn:hover{background:var(--accent-hover);}
.login-error{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;border-radius:6px;padding:9px 14px;font-size:12px;margin-top:10px;display:none;}
.login-error.show{display:block;}
.login-users{margin-top:18px;border-top:1px solid var(--border);padding-top:14px;}
.login-users-label{font-size:11px;color:var(--text-muted);margin-bottom:8px;text-align:center;}
.login-user-btn{display:block;width:100%;text-align:left;padding:7px 12px;margin-bottom:5px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s;}
.login-user-btn:hover{border-color:var(--accent);background:#eff6ff;color:var(--accent);}
.login-user-btn span{font-size:11px;color:var(--text-muted);float:right;font-family:monospace;}
.login-bypass{font-size:11px;color:var(--ok);background:#f0fdf4;border:1px solid #86efac;border-radius:4px;padding:2px 8px;float:right;margin-top:1px;}
/* Профілі */
.profiles-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px;}
.profile-card{border:1px solid var(--border);border-radius:8px;padding:14px;background:#fafaf9;}
.profile-card h4{margin:0 0 8px 0;font-size:13px;color:var(--text);}
.profile-card .profile-login{font-family:monospace;font-size:11px;color:var(--text-muted);margin-bottom:10px;}
.profile-status{font-size:11px;margin-bottom:8px;}
.profile-status.has-pwd{color:var(--ok);}
.profile-status.no-pwd{color:#b45309;}
.profile-input{width:100%;padding:6px 10px;border:1px solid var(--border-strong);border-radius:4px;font-size:12px;font-family:inherit;margin-bottom:6px;}
.profile-btn{padding:5px 10px;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;font-weight:600;}
.profile-btn-set{background:var(--accent);color:#fff;}
.profile-btn-bypass{background:var(--ok);color:#fff;margin-left:4px;}
.profile-btn-revoke{background:#6b7280;color:#fff;margin-left:4px;}
/* user badge */
.user-badge{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;}
.user-badge strong{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;}
.btn-logout{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit;}
.btn-logout:hover{background:rgba(255,255,255,.25);}
.btn-change-pwd{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit;margin-right:8px;}
.btn-change-pwd:hover{background:rgba(255,255,255,.25);}

/* ===== HEADER ===== */
#appHeader{background:var(--accent);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:12px;}
#appHeader h1{margin:0;font-size:16px;font-weight:600;}

.db-status{font-size:11px;opacity:.8;}

/* ===== MAIN APP ===== */
#appPage{display:none;padding:14px 16px;}

.toolbar,.filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;}
.btn{padding:6px 12px;border:1px solid var(--border-strong);background:var(--surface);color:var(--text);border-radius:4px;cursor:pointer;font-size:13px;font-family:inherit;}
.btn:hover{background:#f5f5f4;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover:not(:disabled){background:var(--accent-hover);}
.btn-log{background:#7c3aed;color:#fff;border-color:#7c3aed;}
.btn-log:hover{background:#6d28d9;}
.btn-sync{background:#0369a1;color:#fff;border-color:#0369a1;}
.btn-sync:hover{background:#075985;}
.file-input{display:none;}
.filters input[type="text"],.filters select{padding:5px 8px;border:1px solid var(--border-strong);border-radius:4px;font-size:13px;font-family:inherit;}
.filters label{color:var(--text-muted);font-size:12px;}

.summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 14px;min-width:110px;}
.stat-label{color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em;}
.stat-value{font-size:18px;font-weight:600;margin-top:2px;}
.stat.warn .stat-value{color:var(--warn);}
.stat.soft .stat-value{color:#b45309;}
.stat.ok .stat-value{color:var(--ok);}

.tabs{display:flex;gap:4px;margin-bottom:8px;border-bottom:1px solid var(--border);}
.tab{padding:7px 14px;border:1px solid transparent;border-bottom:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:13px;font-family:inherit;border-radius:4px 4px 0 0;margin-bottom:-1px;}
.tab:hover{color:var(--text);}
.tab.active{background:var(--surface);border-color:var(--border);color:var(--text);font-weight:600;}

.info-line{font-size:12px;color:var(--text-muted);margin-bottom:6px;}
.info-line kbd{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:11px;font-family:monospace;}

.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:auto;max-height:calc(100vh - 300px);}
table{border-collapse:collapse;width:max-content;min-width:100%;font-size:12px;table-layout:fixed;}
th{background:#f5f5f4;text-align:left;padding:7px 8px;border-bottom:2px solid var(--border-strong);border-right:1px solid var(--border);font-weight:600;position:sticky;top:0;white-space:nowrap;z-index:2;user-select:none;box-sizing:border-box;}
th .resizer{position:absolute;top:0;right:0;width:6px;height:100%;cursor:col-resize;user-select:none;background:transparent;z-index:3;}
th .resizer:hover,th .resizer.resizing{background:var(--accent);opacity:.5;}
th.editable{background:var(--highlight);}
th.sortable{cursor:pointer;}
th.sortable:hover{background:#e7e5e4;}
th .sort-arrow{font-size:10px;margin-left:4px;color:var(--text-muted);}
th .sort-arrow.active{color:var(--accent);}
td{padding:4px 6px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;}
td.col-wrap,th.col-wrap{white-space:normal;word-break:break-word;}
td.col-compact,th.col-compact{white-space:nowrap;}
tr:hover td{background:var(--row-hover);}
tr.row-overdue td{background:var(--warn-bg);}
tr.row-overdue:hover td{background:#fecaca;}
tr.row-soon td{background:var(--warn-soft);}
tr.row-soon:hover td{background:#fde68a;}
tr.row-selected td{background:#dbeafe !important;}
td input[type="text"],td input[type="number"],td input[type="date"],td select{width:100%;border:1px solid transparent;background:transparent;padding:3px 5px;font-size:12px;font-family:inherit;border-radius:3px;}
td input:focus,td select:focus{border-color:var(--accent);background:#fff;outline:none;}
td select{cursor:pointer;}
td select:hover{border-color:var(--border);}
td input.dup-warn{background:var(--warn-bg);border-color:var(--warn);}
td.checkbox-cell{text-align:center;width:56px;}
td input[type="checkbox"]{width:16px;height:16px;cursor:pointer;accent-color:var(--accent);}
td.status-cell{font-weight:500;white-space:nowrap;text-align:center;font-size:11px;}
.status-missing{color:var(--warn);}
.type-atm{background:#dbeafe;color:#1e40af;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;}
.type-ipt{background:#f3e8ff;color:#6d28d9;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;}
.status-ready{color:var(--ok);font-size:12px;}
.status-pending{color:#b45309;}
td.col-port input,td.col-date input,td.col-id input,td.col-sd input,td input,td select{box-sizing:border-box;}
td.col-id{font-family:"SF Mono",Monaco,monospace;font-weight:500;white-space:nowrap;}
td.col-fio select{width:100%;}
td.action-cell{white-space:nowrap;text-align:center;min-width:130px;}
.btn-launch,.btn-back,.btn-del,.btn-dup{padding:4px 8px;border:1px solid var(--border-strong);background:var(--surface);border-radius:3px;cursor:pointer;font-size:11px;font-family:inherit;margin:0 1px;}
.btn-launch{background:var(--ok);color:#fff;border-color:var(--ok);}
.btn-launch:hover:not(:disabled){background:#166534;}
.btn-launch:disabled{background:#d6d3d1;border-color:#d6d3d1;cursor:not-allowed;}
.btn-back:hover{background:#f5f5f4;}
.btn-dup{color:var(--info);}
.btn-dup:hover{background:#e0f2fe;}
.btn-del{color:var(--warn);width:24px;padding:4px 6px;}
.btn-del:hover{background:var(--warn);color:#fff;border-color:var(--warn);}
td.meta-cell{font-size:10px;color:var(--text-muted);white-space:nowrap;}
.empty-state{padding:60px 20px;text-align:center;color:var(--text-muted);}

.bulk-bar{display:none;background:var(--accent);color:#fff;padding:8px 14px;border-radius:6px;margin-bottom:8px;align-items:center;gap:12px;font-size:13px;}
.bulk-bar.show{display:flex;}
.bulk-bar button{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 10px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:12px;}
.bulk-bar button:hover{background:rgba(255,255,255,.3);}

/* ===== MODAL ===== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:8px;padding:20px;max-width:700px;width:95%;max-height:85vh;overflow:auto;}
.modal h2{margin:0 0 12px 0;font-size:16px;}
.modal .funnel-row{display:flex;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);}
.modal .funnel-row:last-child{border-bottom:none;}
.modal .bar{background:var(--accent);height:6px;border-radius:3px;margin-top:4px;}

/* ===== LOG TABLE ===== */
.log-table{width:100%;border-collapse:collapse;font-size:12px;}
.log-table th{background:#f5f5f4;padding:6px 10px;text-align:left;border-bottom:2px solid var(--border-strong);white-space:nowrap;}
.log-table td{padding:5px 10px;border-bottom:1px solid var(--border);}
.log-table tr:hover td{background:#fafaf9;}
.log-action-edit{color:#0369a1;}
.log-action-add{color:#15803d;}
.log-action-delete{color:#b91c1c;}
.log-action-launch{color:#7c3aed;}
.log-action-return{color:#b45309;}
.log-action-import{color:#0369a1;}
.log-action-export{color:#15803d;}
.log-action-login{color:#1e40af;}

/* Sticky колонки */
.sticky-cb{position:sticky;left:0;z-index:3;background:inherit;}
.sticky-type{position:sticky;left:32px;z-index:3;background:inherit;}
.sticky-id{position:sticky;left:112px;z-index:3;background:inherit;}
.sticky-adres{position:sticky;left:212px;z-index:3;background:inherit;min-width:220px;max-width:260px;}
th.sticky-cb,th.sticky-type,th.sticky-id,th.sticky-adres{z-index:4;}
th.sticky-cb{background:#f5f5f4;}
th.sticky-type{background:#f5f5f4;}
th.sticky-id{background:#f5f5f4;}
th.sticky-adres{background:#f5f5f4;}
td.sticky-cb,td.sticky-type,td.sticky-id,td.sticky-adres{background:var(--surface,#fff);}
tr:hover td.sticky-cb,tr:hover td.sticky-type,tr:hover td.sticky-id,tr:hover td.sticky-adres{background:var(--row-hover,#fafaf9);}
tr.row-overdue td.sticky-cb,tr.row-overdue td.sticky-type,tr.row-overdue td.sticky-id,tr.row-overdue td.sticky-adres{background:#fee2e2;}
tr.row-soon td.sticky-cb,tr.row-soon td.sticky-type,tr.row-soon td.sticky-id,tr.row-soon td.sticky-adres{background:#fef3c7;}
tr.row-selected td.sticky-cb,tr.row-selected td.sticky-type,tr.row-selected td.sticky-id,tr.row-selected td.sticky-adres{background:#dbeafe!important;}
.sticky-shadow{box-shadow:2px 0 6px rgba(0,0,0,.08);}
/* Групи стовпців: розділювач перед "Етапами" та "Технічними" */
[data-col="dogovir"]{border-left:2px solid var(--border-strong)!important;}
[data-col="port"]{border-left:2px solid var(--border-strong)!important;}
/* Компактний режим: ховаємо описові й технічні стовпці, лишаємо ID, адресу та етапи */
.compact [data-col="SD"], .compact [data-col="Org"], .compact [data-col="Old ATM"],
.compact [data-col="FIO"], .compact [data-col="port"], .compact [data-col="date pog"],
.compact [data-col="Date SLO"], .compact [data-col="Date Start"], .compact [data-col="Note"]{display:none;}
/* Картка редагування рядка */
.card-head h3{margin:0 0 12px;font-size:16px;}
.card-group{margin-bottom:14px;}
.card-group-title{font-weight:700;font-size:12px;color:#0369a1;text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:3px;}
.card-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;}
.card-fields label{display:flex;flex-direction:column;font-size:12px;gap:3px;color:#555;}
.card-fields label.card-check{flex-direction:row;align-items:center;gap:7px;font-size:13px;color:#222;padding:4px 0;}
.card-fields input[type=text],.card-fields select,.card-fields textarea{padding:6px 8px;border:1px solid var(--border);border-radius:4px;font-size:13px;color:#222;font-family:inherit;}
.card-fields input[type=checkbox]{width:18px;height:18px;}
.card-actions{margin-top:16px;display:flex;gap:8px;justify-content:flex-end;}
.btn-edit{background:#0369a1;color:#fff;border:1px solid #0369a1;border-radius:4px;cursor:pointer;padding:1px 4px;font-size:11px;line-height:1.4;}
.btn-edit:hover{background:#075985;}
</style>
</head>
<body>



<!-- ===== LOGIN PAGE ===== -->
<div id="loginPage" style="display:none">
  <div class="login-card">
    <div class="login-logo">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="10" fill="#1e40af"/><rect x="10" y="14" width="28" height="20" rx="3" fill="white" opacity="0.9"/><rect x="14" y="22" width="8" height="8" rx="1" fill="#1e40af"/></svg>
    </div>
    <div class="login-title">Редактор заявок ATM</div>
    <div class="login-sub">АТ «Ощадбанк» · Введіть логін для входу</div>
    <div class="login-field">
      <label>Логін</label>
      <input type="text" id="loginInput" placeholder="наприклад: PavelkoOV" autocomplete="off"
        oninput="onLoginInput()" onkeydown="if(event.key==='Enter')focusOrLogin()">
    </div>
    <div id="passwordField" style="display:none" class="login-field">
      <label>Пароль</label>
      <input type="password" id="passwordInput" placeholder="••••••••"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">Увійти</button>
    <div class="login-error" id="loginError">Невірний логін або пароль.</div>
    <div class="login-users">
      <div class="login-users-label">Швидкий вибір</div>
      <button class="login-user-btn" id="qPavelkoOV" onclick="quickLogin('PavelkoOV')">Павелко Олександр Валентинович <span>PavelkoOV</span></button>
      <button class="login-user-btn" id="qPilkevichAA" onclick="quickLogin('PilkevichAA')">Пількевич Андрій Анатолійович <span>PilkevichAA</span></button>
      <button class="login-user-btn" id="qDanevichNS" onclick="quickLogin('DanevichNS')">Даневич Наталія Сергіївна <span>DanevichNS</span></button>
      <button class="login-user-btn" id="qstrazhevskijoo" onclick="quickLogin('strazhevskijoo')">Стражевський Олексій Олексійович <span>strazhevskijoo</span></button>
      <button class="login-user-btn" id="qdembnovetskyiiv" onclick="quickLogin('dembnovetskyiiv')">Дембновецький Іван Володимирович <span>dembnovetskyiiv</span></button>
    </div>
  </div>
</div>

<!-- ===== APP HEADER ===== -->
<div id="appHeader" style="display:none">
  <svg width="24" height="24" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="10" fill="rgba(255,255,255,.2)"/><rect x="10" y="14" width="28" height="20" rx="3" fill="white" opacity="0.9"/><rect x="14" y="22" width="8" height="8" rx="1" fill="#1e40af"/></svg>
  <h1>Редактор заявок ATM</h1>
  <span class="db-status" id="dbStatus">● Завантаження...</span>
  <div class="user-badge">
    <strong id="headerUser"></strong>
    <button class="btn-change-pwd" id="changePwdBtn" onclick="showChangePwd()" style="display:none">🔑 Змінити пароль</button>
    <button class="btn-logout" onclick="doLogout()">Вийти</button>
  </div>
</div>

<!-- ===== APP PAGE ===== -->
<div id="appPage" style="display:none">
  <div class="toolbar">
    <input type="file" id="fileInput" class="file-input" accept=".xlsx,.xls">
    <button class="btn" id="importBtn" onclick="document.getElementById('fileInput').click()" style="display:none">📥 Імпорт Excel</button>
    <button class="btn btn-primary" id="exportBtn" onclick="exportExcel()" disabled>📤 Експорт Excel</button>
    <button class="btn btn-sync" id="syncBtn" onclick="syncFromDB()">🔄 Оновити з бази</button>
    <button class="btn btn-sync" id="updateDbBtn" onclick="pushAllToDB()" style="display:none">💾 Оновити базу</button>
    <button class="btn" id="addRowBtn" onclick="addRow()" disabled>+ Додати ТБС</button>
    <button class="btn" id="compactBtn" onclick="toggleCompact()">↔ Компактно</button>
    <button class="btn" id="reportBtn" onclick="showReport()" disabled>📊 Звіт</button>
    <button class="btn btn-log" id="logBtn" onclick="showLog()">📋 Журнал дій</button>
    <button class="btn" id="cpBtn" onclick="window.open('checkpoint.html','_blank')" style="display:none;background:#0369a1;color:#fff;border-color:#0369a1">🔒 CheckPoint</button>
    <button class="btn" id="profilesBtn" onclick="showProfiles()" style="display:none;background:#6d28d9;color:#fff;border-color:#6d28d9">👥 Профілі</button>
    <span style="margin-left:auto;color:var(--text-muted);font-size:12px;" id="info">Завантаження...</span>
  </div>

  <div class="filters" id="filters" style="display:none">
    <label>Пошук:</label>
    <input type="text" id="searchInput" placeholder="ID, адреса, SD..." style="width:200px" oninput="render()">
    <label>FIO:</label>
    <select id="fioFilter" onchange="render()"><option value="">Усі</option></select>
    <label>Статус:</label>
    <select id="statusFilter" onchange="render()">
      <option value="">Усі</option>
      <option value="ready">Готові до запуску</option>
      <option value="pending">Незавершені</option>
      <option value="overdue">Прострочені</option>
      <option value="soon">Дедлайн ≤ 10 робочих днів</option>
    </select>
    <button class="btn" onclick="resetFilters()">Скинути</button>

let userSettings = {};

// Проста hash функція (не криптографічна, але достатня для внутрішнього інструменту)
async function hashPwd(pwd) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pwd + 'atm_tbs_salt'));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function loadUserSettings() {
  try {
    const rows = await sbGet('atm_settings', 'select=login,pwd_hash,bypass');
    userSettings = {};
    rows.forEach(r => { userSettings[r.login] = { pwd_hash: r.pwd_hash||'', bypass: !!r.bypass }; });
  } catch(e) {
    // Таблиця може не існувати ще — тихо ігноруємо
    userSettings = {};
  }
  // Оновлюємо кнопки швидкого входу (показуємо bypass)
  Object.entries(USERS).forEach(([login]) => {
    const s = userSettings[login];
    const btn = document.getElementById('q'+login);
    if (!btn) return;
    const old = btn.querySelector('.login-bypass');
    if (old) old.remove();
    if (s?.bypass) {
      const tag = document.createElement('span');
      tag.className = 'login-bypass'; tag.textContent = 'без пароля';
      btn.appendChild(tag);
    }
  });
}

async function onLoginInput() {
  const login = document.getElementById('loginInput').value.trim();
  const s = userSettings[login];
  const hasPwd = s?.pwd_hash && !s?.bypass;
  document.getElementById('passwordField').style.display = hasPwd ? 'block' : 'none';
  document.getElementById('loginError').classList.remove('show');
}

function focusOrLogin() {
  const login = document.getElementById('loginInput').value.trim();
  const s = userSettings[login];
  const hasPwd = s?.pwd_hash && !s?.bypass;
  if (hasPwd) document.getElementById('passwordInput').focus();
  else doLogin();
}

async function doLogin() {
  const login = document.getElementById('loginInput').value.trim();
  if (!USERS[login]) {
    document.getElementById('loginError').textContent = 'Невідомий логін.';
    document.getElementById('loginError').classList.add('show'); return;
  }
  const s = userSettings[login];
  const hasPwd = s?.pwd_hash && !s?.bypass;
  if (hasPwd) {
    const pwd = document.getElementById('passwordInput').value;
    const hash = await hashPwd(pwd);
    if (hash !== s.pwd_hash) {
      document.getElementById('loginError').textContent = 'Невірний пароль.';
      document.getElementById('loginError').classList.add('show'); return;
    }
  }
  loginSuccess(login);
}

async function sbGet(table, params='') {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPost(table, data) {
  // Батчинг — максимум 500 рядків за раз
  const BATCH = 500;
  const arr = Array.isArray(data) ? data : [data];
  for (let i = 0; i < arr.length; i += BATCH) {
    const chunk = arr.slice(i, i + BATCH);
    const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY,
                  'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(chunk)
    });
    if (!r.ok) throw new Error(await r.text());
  }
}
async function sbDelete(table, filter) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${filter}`, {
    method: 'DELETE',
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Prefer': 'return=minimal'
    }
  });
  // Не кидаємо помилку якщо нічого не знайдено (404/406)
  if (!r.ok && r.status !== 404 && r.status !== 406) {
    console.warn('sbDelete warning:', r.status, await r.text());
  }
}
async function sbUpsert(table, data, conflict) {
  const BATCH = 500;
  const arr = Array.isArray(data) ? data : [data];
  const params = conflict ? `?on_conflict=${encodeURIComponent(conflict)}` : '';
  for (let i = 0; i < arr.length; i += BATCH) {
    const chunk = arr.slice(i, i + BATCH);
    const r = await fetch(`${SB_URL}/rest/v1/${table}${params}`, {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY,
                 'Content-Type': 'application/json',
                 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify(chunk)
    });
    if (!r.ok) throw new Error(await r.text());
  }
}

function rowToSB(row, sheet) {

    bec:           !!row.BEC,
    limi:          !!row.Limi,
    tmk:           !!(row['ТМК']),
    signalizaciya: !!(row['Сигналізація']),
    sbon:          !!(row['СБОН']),

    port:          row.port            || '',

    date_start:    row['Date Start']   || '',

  };
}

async function sbDeleteById(id) {

function setSaved() {
  const s = document.getElementById('dbStatus');
  if (s) s.textContent = '● Збережено · ' + new Date().toLocaleTimeString('uk-UA');
}
// Зберегти ОДИН рядок: оновити за _sbId, або вставити новий і запам'ятати id
async function persistRow(row, sheetName) {
  try {
    const data = rowToSB(row, sheetName);
    if (row._sbId) await sbUpdateById(row._sbId, data);
    else { const c = await sbInsertOne(data); if (c && c.id != null) row._sbId = c.id; }
    setSaved();
    return true;
  } catch(e) {
    console.error('persistRow:', e);
    const s = document.getElementById('dbStatus');
    if (s) s.textContent = "⚠ Помилка збереження — перевірте зʼєднання";
    return false;
  }
}

// ===== REALTIME (жива синхронізація між користувачами) =====
let _rtInited = false, _rtTimer = null;
function setupRealtime() {
  if (_rtInited || !window.supabase || !window.supabase.createClient) return;
  _rtInited = true;
  try {
    const client = window.supabase.createClient(SB_URL, SB_KEY);
    client.channel('atm_units_test_rt')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'atm_units_test' }, () => scheduleRealtimeRefresh())
      .subscribe();
  } catch(e) { console.warn('Realtime init:', e); }
}
function scheduleRealtimeRefresh() {
  clearTimeout(_rtTimer);
  _rtTimer = setTimeout(() => {
    // Не оновлюємо, поки користувач щось редагує — щоб не затерти його правку
    const ae = document.activeElement;
    if (ae && ae.matches && ae.matches('input,select,textarea')) { scheduleRealtimeRefresh(); return; }
    reloadDataKeepView();
  }, 1500);
}
async function reloadDataKeepView() {
  try {
    let allRows = [], from = 0;
    while (true) {
      const chunk = await sbGet('atm_units_test', `order=id.asc&limit=1000&offset=${from}`);
      allRows = allRows.concat(chunk);
      if (chunk.length < 1000) break;
      from += 1000;
    }
    const dedup = arr => { const m=new Map(); arr.forEach((r,i)=>m.set(r.ID?('id:'+r.ID):('blank:'+i),r)); return [...m.values()]; };
    sheets.active = dedup(allRows.filter(r => r.sheet==='ATM').map(r => deserializeRow(r)));
    sheets.zap    = dedup(allRows.filter(r => r.sheet==='ZAP').map(r => deserializeRow(r)));
    rebuildFilters(); render(); updateUI();
    const s = document.getElementById('dbStatus');
    if (s) s.textContent = '● Оновлено (синхронізація) · ' + new Date().toLocaleTimeString('uk-UA');
  } catch(e) { console.error('realtime reload:', e); }
}

// Ручна заливка початкових даних — спрацьовує ТІЛЬКИ коли база справді порожня
async function seedInitialData() {

  rebuildFilters(); render(); updateUI();
  alert('Початкові дані залито.');
}
window.seedInitialData = seedInitialData;

async function loadFromDB() {
  try {
    document.getElementById('tableWrap').innerHTML =
      '<div class="empty-state"><p>⏳ Завантаження з бази...</p></div>';
    // Завантажуємо всі дані з однієї таблиці
    let allRows = [], from = 0;
    while (true) {
      const chunk = await sbGet('atm_units_test', `order=id.asc&limit=1000&offset=${from}`);
      allRows = allRows.concat(chunk);
      if (chunk.length < 1000) break;
      from += 1000;
    }
    const atmRows = allRows.filter(r => r.sheet === 'ATM').map(r => deserializeRow(r));
    const zapRows = allRows.filter(r => r.sheet === 'ZAP').map(r => deserializeRow(r));
    if (atmRows.length > 0 || zapRows.length > 0) {
      sheets.active = atmRows;
      sheets.zap = zapRows;
    } else {
      // База повернула 0 рядків. НЕ заливаємо seed автоматично:
      // порожня відповідь може бути через збій читання, і автозаливка
      // затерла б реальні дані (саме це спричиняло «відкат»).
      // Початкові дані за потреби заливаються лише вручну (seedInitialData()).
      sheets.active = [];
      sheets.zap = [];
      console.warn('loadFromDB: база повернула 0 рядків — seed НЕ заливається автоматично');
    }
    // Прибираємо дублі по ID у памʼяті (лишаємо останній; порожні ID не чіпаємо)
    const _dedupById = arr => {
      const m = new Map();
      arr.forEach((r,i) => m.set(r.ID ? ('id:'+r.ID) : ('blank:'+i), r));
      return [...m.values()];
    };
    sheets.active = _dedupById(sheets.active);
    sheets.zap    = _dedupById(sheets.zap);
    currentSheet = 'active';
    rebuildFilters(); render(); updateUI();
    setupRealtime();
    document.getElementById('dbStatus').textContent =
      '● ATM: ' + sheets.active.length + ' · ZAP: ' + sheets.zap.length;
    document.getElementById('info').textContent =
      `ATM ${sheets.active.length}, ZAP ${sheets.zap.length} · ${new Date().toLocaleTimeString('uk-UA')}`;
  } catch(e) {
    console.error('loadFromDB error', e);
    document.getElementById('tableWrap').innerHTML =
      `<div class="empty-state"><p>⚠ Помилка: ${e.message}</p>
       <button class="btn btn-primary" onclick="syncFromDB()">🔄 Повторити</button></div>`;
  }
}

function deserializeRow(r) {
  const row = {};
  row.ID           = r.atm_id      || '';
  row.ADRES        = r.adres       || '';
  row.SD           = r.sd          || '';
  row['date pog']  = r.date_pog    || '';
  row.Org          = r.org         || '';
  row['Old ATM']   = r.old_atm     || '';
  row.FIO          = r.fio         || '';
  row.dogovir      = !!r.dogovir;
  row['Канал']     = r.kanal       || '';
  row.DIS          = !!r.dis;
  row.BEC          = !!r.bec;
  row.Limi         = !!r.limi;
  row['ТМК']       = !!r.tmk;
  row['Сигналізація'] = !!r.signalizaciya;
  row['СБОН']         = !!r.sbon;
  row['_type']        = r.type || 'ATM';
  row.port         = r.port        || '';
  row['Date SLO']  = r.date_slo    || '';
  row['Date Start']= r.date_start  || '';
  row.Note         = r.note        || '';
  row['Статус']    = '';
  row.__meta = {
    created:    r.meta_created  || todayISO(),
    modified:   r.meta_modified || todayISO(),
    launchedAt: r.meta_launched || null,
  };
  row._sbId = r.id;
  return row;
}

async function syncFromDB() {
  const btn = document.getElementById('syncBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Завантаження...'; }
  await loadFromDB();
  logAction('sync', '—', `Завантажено з бази: ATM=${sheets.active.length}, ZAP=${sheets.zap.length}`, currentUser);
  if (btn) { btn.disabled = false; btn.textContent = '🔄 Оновити з бази'; }
  document.getElementById('info').textContent =
    `Оновлено ${new Date().toLocaleTimeString('uk-UA')} · ATM ${sheets.active.length}, ZAP ${sheets.zap.length}`;
}

async function pushAllToDB() {
  if (!confirm('Перезаписати базу поточними даними? Всі зміни інших користувачів будуть втрачені.')) return;
  const btn2 = document.getElementById('updateDbBtn');
  if (btn2) { btn2.disabled = true; btn2.textContent = '⏳ Збереження...'; }
  await Promise.all([
    dbPutAll('atm', sheets.active),
    dbPutAll('zap', sheets.zap)
  ]);
  logAction('push-db', '—', `Оновлення бази: ATM=${sheets.active.length}, ZAP=${sheets.zap.length}`);
  if (btn2) { btn2.disabled = false; btn2.textContent = '💾 Оновити базу'; }
  document.getElementById('info').textContent =
    `База оновлена ${new Date().toLocaleTimeString('uk-UA')} · ATM ${sheets.active.length}, ZAP ${sheets.zap.length}`;
  alert(`✅ Збережено: ATM ${sheets.active.length}, ZAP ${sheets.zap.length}`);
}

let resizeState = null;
document.addEventListener('mousedown', (e) => {
  if (!e.target.classList.contains('resizer')) return;
  e.preventDefault(); e.stopPropagation();
  const th = e.target.closest('th');
  resizeState = { col: e.target.dataset.col, startX: e.clientX, startWidth: th.offsetWidth, th };
  e.target.classList.add('resizing');
  document.body.style.cursor = 'col-resize';
});
document.addEventListener('mousemove', (e) => {
  if (!resizeState) return;
  const delta = e.clientX - resizeState.startX;
  const newWidth = Math.max(40, resizeState.startWidth + delta);
  colWidths[resizeState.col] = newWidth;
  resizeState.th.style.width = newWidth + 'px';
});
document.addEventListener('mouseup', () => {
  if (!resizeState) return;
  document.querySelectorAll('.resizer.resizing').forEach(el => el.classList.remove('resizing'));
  document.body.style.cursor = '';
  resizeState = null;
});
document.addEventListener('dblclick', (e) => {
  if (!e.target.classList.contains('resizer')) return;
  delete colWidths[e.target.dataset.col];
  render();
});

// ===== IMPORT =====
function handleFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      const wb = XLSX.read(new Uint8Array(evt.target.result), { type:'array', cellDates:true });
      const names = wb.SheetNames;
      const zapName = names.find(n => /^zap$/i.test(n));
      const logName = names.find(n => /^log$/i.test(n));
      const activeName = names.find(n => n !== zapName && n !== logName) || names[0];
      sheets.active = XLSX.utils.sheet_to_json(wb.Sheets[activeName], { defval:'', raw:false }).map(r => normalizeRow(r));
      sheets.zap = zapName ? XLSX.utils.sheet_to_json(wb.Sheets[zapName], { defval:'', raw:false }).map(r => normalizeRow(r, true)) : [];
      // Зберігаємо в базу
      dbPutAll('atm', sheets.active).catch(()=>{});
      dbPutAll('zap', sheets.zap).catch(()=>{});
      logAction('import', file.name, `ATM=${sheets.active.length}, ZAP=${sheets.zap.length}`);
      currentSheet = 'active';
      rebuildFilters(); render(); updateUI();
    } catch(err) { alert('Помилка імпорту: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
}

function findValue(rawRow, col) {
  if (rawRow[col.key] !== undefined && rawRow[col.key] !== '') return rawRow[col.key];
  const t = col.key.toLowerCase().trim();
  for (const k in rawRow) if (k.toLowerCase().trim() === t && rawRow[k] !== '') return rawRow[k];
  const a = ALIASES[col.key] || [];
  for (const al of a) for (const k in rawRow) if (k.toLowerCase().trim() === al && rawRow[k] !== '') return rawRow[k];
  return '';
}

function normalizeRow(r, isZap) {
  const row = {};
  COLUMNS.forEach(col => {
    let v = findValue(r, col);
    if (col.type === 'check') v = parseCheck(v);
    else if (col.type === 'date') { v = parseDate(v); if (!v && col.today) v = todayISO(); }
    else if (col.type === 'port') v = (v===''||v===null) ? '' : String(v).replace(/\D/g,'').slice(0,4);
    else if (col.type === 'alnum') v = String(v??'').slice(0, col.maxLen||64);
    else if (col.type === 'sd') v = sanitizeSD(v);
    else if (col.type === 'select') {
      v = v===null ? '' : String(v).trim();
      if (v && !col.options.includes(v)) v = '';
    }
    else if (col.type === 'note') v = String(v??'').slice(0,500);
    else if (col.type === 'status') v = '';
    else v = v===null ? '' : String(v);
    row[col.key] = v;
  });
  if (!row['Канал'] && /^ТВБВ/i.test(String(row['Org']||'').trim())) row['Канал'] = 'ТВБВ';
  if (!row['_type']) row['_type'] = r['_type'] || r['type'] || 'ATM';
  if (!('СБОН' in row)) row['СБОН'] = parseCheck(r['СБОН'] || false);
  row.__meta = {
    created: parseDate(r['__created']) || todayISO(),
    modified: parseDate(r['__modified']) || todayISO(),
    launchedAt: isZap ? (parseDate(r['__launched']) || todayISO()) : null,
  };
  return row;
}

function parseCheck(v) {
  if (v===true||v===1) return true;
  return ['1','true','✓','✔','x','+','так','yes','y','v'].includes(String(v??'').trim().toLowerCase());
}
function parseDate(v) {
  if (!v) return '';
  if (v instanceof Date && !isNaN(v)) return v.toISOString().slice(0,10);
  const s = String(v).trim();
  let m = s.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{4})$/);
  if (m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  return '';
}
// Підрахунок робочих днів (пн-пт) від дати до сьогодні (позитивне = майбутнє)
function workdaysBetween(isoFrom, isoTo) {
  if (!isoFrom || !isoTo) return null;
  let d1 = new Date(isoFrom); d1.setHours(0,0,0,0);
  let d2 = new Date(isoTo);   d2.setHours(0,0,0,0);
  let sign = d2 >= d1 ? 1 : -1;
  let [start, end] = sign === 1 ? [d1, d2] : [d2, d1];
  let count = 0;
  let cur = new Date(start);
  while (cur < end) {
    cur.setDate(cur.getDate() + 1);
    const dow = cur.getDay();
    if (dow !== 0 && dow !== 6) count++;
  }
  return sign * count;
}
// Робочих днів від isoDate до сьогодні (від'ємне = минула, позитивне = майбутнє)
function workdaysUntil(isoDate) {
  if (!isoDate) return null;
  return workdaysBetween(todayISO(), isoDate);
}

function fmtDateUk(iso) {
  if (!iso) return '';
  const m = String(iso).match(/^(\d{4})-(\d{2})-(\d{2})$/);
  return m ? `${m[3]}.${m[2]}.${m[1]}` : iso;
}
function todayISO() { return new Date().toISOString().slice(0,10); }
function nowTS() { return new Date().toLocaleString('uk-UA', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' }); }
function sanitizeSD(v) {
  if (!v) return '';
  const s = String(v).trim().toUpperCase();
  const m = s.match(/SC-?(\d+)/);
  if (m) return 'SC-' + m[1];
  const d = s.replace(/\D/g,'');
  return d ? 'SC-' + d : '';
}

// ===== STATUS =====
function getMissing(row) {
  const m = [];
  const isIPT = row['_type'] === 'IPT';
  // Базові чекбокси для всіх
  [...CHECK_COLS, 'ТМК', 'Сигналізація'].forEach(k => { if (!row[k]) m.push(k); });
  // Ліміти — тільки для ATM
  if (!isIPT && !row['Limi']) m.push('Ліміти');
  // СБОН — тільки для ІПТ
  if (isIPT && !row['СБОН']) m.push('СБОН');
  if (!row['port']) m.push('port');
  if (!row['Канал']) m.push('Канал');
  return m;
}
// Повністю готово: всі галочки + Канал + Date SLO заповнено
function isReady(row) {
  return getMissing(row).length === 0 && row['Date SLO'];
}
function isPending(row) { return getMissing(row).length > 0; }
// Робочих днів до/від дати відправки SLO
function sloWorkdaysUntil(row) {
  if (!row['Date SLO']) return null;
  return workdaysUntil(row['Date SLO']);
}
// Дедлайн рахується ВІД дня постановки на СЛО (Date SLO): від цього дня дається 10 робочих днів.
const SLO_DEADLINE_DAYS = 10;
// Робочих днів, що минуло від дня СЛО до сьогодні (>0 — СЛО вже була; <0 — ще попереду)
function sloWorkdaysElapsed(row) {
  if (!row['Date SLO']) return null;
  return workdaysBetween(row['Date SLO'], todayISO());
}
// Прострочка: від дня СЛО минуло понад 10 робочих днів
function isOverdue(row) {
  const e = sloWorkdaysElapsed(row);
  return e !== null && e > SLO_DEADLINE_DAYS;
}
// Дедлайн: СЛО вже відбулась і ще в межах 10 робочих днів (не прострочено)
function isSoon(row) {
  const e = sloWorkdaysElapsed(row);
  return e !== null && e >= 0 && e <= SLO_DEADLINE_DAYS;
}
function rowClass(row) {
  if (currentSheet !== 'active') return '';
  if (!row['Date SLO']) return '';
  if (isOverdue(row)) return 'row-overdue';
  if (isSoon(row)) return 'row-soon';
  return '';
}
function computeStatus(row) {
  const m = getMissing(row);
  if (m.length > 0) {
    return `<span class="status-missing">немає: ${m.join(', ')}</span>`;
  }
  // Всі галочки є і Канал є — показуємо Date SLO або підказку
  if (!row['Date SLO']) {
    return `<span class="status-pending">вкажіть Date of sending SLO</span>`;
  }
  return `<span class="status-ready">${fmtDateUk(row['Date SLO'])}</span>`;
}

// ===== FILTERS =====
function rebuildFilters() {
  const sel = document.getElementById('fioFilter');
  const cur = sel ? sel.value : '';
  const fioSet = new Set();
  [...sheets.active,...sheets.zap].forEach(r => { if (r.FIO) fioSet.add(r.FIO); });
  const opts = [...fioSet].sort();
  sel.innerHTML = '<option value="">Усі</option>' +
    opts.map(f => `<option value="${escapeAttr(f)}">${escapeHtml(f)}</option>`).join('');
  if (cur && opts.includes(cur)) sel.value = cur;
}
function getFilteredIndices() {
  const q = (document.getElementById('searchInput')?.value||'').trim().toLowerCase();
  const fio = document.getElementById('fioFilter')?.value||'';
  const status = document.getElementById('statusFilter')?.value||'';
  const rows = sheets[currentSheet];
  const result = [];
  rows.forEach((r,i) => {
    if (q) {
      const hay = [r.ID,r.ADRES,r.SD,r.Org,r['Old ATM']].map(x=>String(x||'').toLowerCase()).join(' ');
      if (!hay.includes(q)) return;
    }
    if (fio && r.FIO!==fio) return;
    if (status==='ready' && !isReady(r)) return;
    if (status==='pending' && !isPending(r)) return;
    if (status==='overdue' && !isOverdue(r)) return;
    if (status==='soon' && !isSoon(r)) return;
    result.push(i);
  });
  if (sortBy) {
    result.sort((a,b) => {
      const va=String(rows[a][sortBy]||'').toLowerCase();
      const vb=String(rows[b][sortBy]||'').toLowerCase();
      return va<vb?-sortDir:va>vb?sortDir:0;
    });
  }
  return result;
}

// ===== RENDER =====
function render() {
  const rows = sheets[currentSheet];
  if (rows.length===0) {
    document.getElementById('tableWrap').innerHTML =
      `<div class="empty-state"><p>${currentSheet==='zap'?'Аркуш ZAP порожній':'Немає даних'}</p></div>`;
    updateSummary(); return;
  }
  const indices = getFilteredIndices();
  let html = '<table><thead><tr>';
  if (currentSheet==='active') html += `<th style="width:32px"><input type="checkbox" onchange="toggleAll(this.checked)"></th>`;
  const STICKY_COLS = {'_type':'sticky-type','ID':'sticky-id','ADRES':'sticky-adres sticky-shadow'};
  COLUMNS.forEach(col => {
    const editable = col.type!=='status';
    const wrap = col.wrap?'col-wrap':'';
    const sortable = col.sortable?'sortable':'';
    const arrow = sortBy===col.key?`<span class="sort-arrow active">${sortDir===1?'▲':'▼'}</span>`:'';
    const onclick = col.sortable?`onclick="if(!event.target.classList.contains('resizer'))toggleSort('${col.key}')"` :'';
    const w = colWidths[col.key]||col.width||120;
    const stickyClass = STICKY_COLS[col.key]||'';
    html += `<th class="${editable?'editable':''} ${wrap} ${sortable} ${stickyClass}" data-col="${col.key}" style="width:${w}px" ${onclick}>${col.label}${arrow}<span class="resizer" data-col="${col.key}"></span></th>`;
  });
  html += '<th>Дії</th>';
  if (currentSheet==='zap') html += '<th>Запущено</th>';
  html += '</tr></thead><tbody>';
  indices.forEach(i => {
    const row = rows[i];
    const cls = [rowClass(row), selected.has(i)?'row-selected':''].filter(Boolean).join(' ');
    html += `<tr class="${cls}">`;
    if (currentSheet==='active') html += `<td class="checkbox-cell sticky-cb"><input type="checkbox" ${selected.has(i)?'checked':''} onchange="toggleSelect(${i},this.checked)"></td>`;
    COLUMNS.forEach(col => { html += renderCell(row,col,i).replace('<td', `<td data-col="${col.key}"`); });
    html += renderActionCell(i,row);
    if (currentSheet==='zap') html += `<td class="meta-cell">${fmtDateUk(row.__meta?.launchedAt)||'—'}</td>`;
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;
  updateSummary(); updateBulkBar();
}

function renderCell(row, col, idx) {
  const v = row[col.key];
  const wrapClass = col.wrap?'col-wrap':'';
  if (col.type==='alnum') {
    const STICKY_TD = {'ID':'sticky-id','ADRES':'sticky-adres sticky-shadow'};
    const stickyTd = STICKY_TD[col.key]||'';
    const cls = (col.key==='ID'?'col-id ':'')+wrapClass+' '+stickyTd;
    const softHandler = col.key==='Org'
      ? `updateCellOrg(${idx},this.value.slice(0,${col.maxLen}))`
      : `updateCellSoft(${idx},'${col.key}',this.value.slice(0,${col.maxLen}))`;
    const isDup = col.key==='ID' && v && isDuplicateId(v,idx);
    return `<td class="${cls}"><input type="text" maxlength="${col.maxLen}"
      class="${isDup?'dup-warn':''}" title="${isDup?'Дублікат ID':''}"
      value="${escapeAttr(v)}"
      oninput="${softHandler}"
      onchange="onCellChange(${idx},'${col.key}',this.value)"></td>`;
  }
  if (col.type==='note') {
    return `<td class="${wrapClass}"><input type="text" maxlength="500"
      placeholder="Нотатка..." value="${escapeAttr(v)}"
      oninput="updateCellSoft(${idx},'${col.key}',this.value)"
      onchange="onCellChange(${idx},'Note',this.value)"></td>`;
  }
  if (col.type==='select') {
    const opts = col.options.map(o =>
      `<option value="${escapeAttr(o)}" ${o===v?'selected':''}>${escapeHtml(o||'—')}</option>`).join('');
    const cls = col.key==='FIO'?'col-fio':'';
    return `<td class="${cls}"><select onchange="updateCell(${idx},'${col.key}',this.value)">${opts}</select></td>`;
  }
  if (col.type==='sd') {
    return `<td class="col-sd"><input type="text" placeholder="SC-XXXXXXXX" maxlength="20"
      value="${escapeAttr(v)}"
      oninput="updateCellSoft(${idx},'${col.key}',this.value)"
      onchange="this.value=sanitizeSD(this.value);updateCell(${idx},'${col.key}',this.value)"></td>`;
  }
  if (col.type==='check' || col.type==='check-atm' || col.type==='check-ipt') {
    const isIPT = row['_type'] === 'IPT';
    // check-atm — тільки для ATM; check-ipt — тільки для ІПТ
    if (col.type==='check-atm' && isIPT) return `<td class="checkbox-cell" style="color:var(--text-muted);font-size:11px">—</td>`;
    if (col.type==='check-ipt' && !isIPT) return `<td class="checkbox-cell" style="color:var(--text-muted);font-size:11px">—</td>`;
    return `<td class="checkbox-cell"><input type="checkbox" ${v?'checked':''}
      onchange="updateCell(${idx},'${col.key}',this.checked)"></td>`;
  }
  if (col.type==='typebadge') {
    const isIPT = row['_type'] === 'IPT';
    const color = isIPT ? 'background:#f3e8ff;color:#6d28d9' : 'background:#dbeafe;color:#1e40af';
    const label = isIPT ? 'ІПТ' : 'ATM';
    return `<td class="sticky-type"><div style="display:flex;align-items:center;gap:4px"><button class="btn-edit" onclick="editCard(${idx})" title="Картка редагування">✏️</button><span style="padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;${color}">${label}</span></div></td>`;
  }
  if (col.type==='port') {
    const dup = v && isDuplicatePort(v,row.ADRES,idx);
    return `<td class="col-port"><input type="text" inputmode="numeric" maxlength="4"
      class="${dup?'dup-warn':''}" title="${dup?'Цей порт вже на цій адресі':''}"
      value="${escapeAttr(v)}"
      oninput="this.value=this.value.replace(/\\D/g,'').slice(0,4);updateCellSoft(${idx},'${col.key}',this.value)"
      onchange="onCellChange(${idx},'port',this.value)"></td>`;
  }
  if (col.type==='date') {
    return `<td class="col-date"><input type="date" value="${escapeAttr(v)}"
      onchange="updateCell(${idx},'${col.key}',this.value)"></td>`;
  }
  if (col.type==='status') return `<td class="status-cell">${computeStatus(row)}</td>`;
  return `<td>${escapeHtml(v)}</td>`;
}

function renderActionCell(idx, row) {
  if (currentSheet==='active') {
    const ready = isReady(row);
    return `<td class="action-cell">
      <button class="btn-launch" ${ready?'':'disabled'} title="${ready?'Перенести в ZAP':'Заповніть всі галочки (включно ТМК), Канал та Date of sending SLO'}" onclick="launchRow(${idx})">Запущено →</button>
      <button class="btn-dup" onclick="duplicateRow(${idx})" title="Дублювати">⎘</button>
      <button class="btn-del" onclick="deleteRow(${idx})" title="Видалити">✕</button>
    </td>`;
  }
  return `<td class="action-cell">
    <button class="btn-back" onclick="returnRow(${idx})">← Повернути</button>
    <button class="btn-del" onclick="deleteRow(${idx})" title="Видалити">✕</button>
  </td>`;
}

function isDuplicateId(id,idx) {
  if (!id) return false;
  return sheets[currentSheet].some((r,i) => i!==idx && r.ID===id);
}
function isDuplicatePort(port,adres,idx) {
  if (!port||!adres) return false;
  return sheets[currentSheet].some((r,i) => i!==idx && r.port===port && r.ADRES===adres);
}

// ===== CELL UPDATES =====
function updateCellSoft(idx, key, value) {
  const rows = sheets[currentSheet];
  if (!rows[idx]) return;
  rows[idx][key] = value;
  if (rows[idx].__meta) rows[idx].__meta.modified = todayISO();
  refreshRow(idx);
}

function onCellChange(idx, key, value) {
  const rows = sheets[currentSheet];
  if (!rows[idx]) return;
  rows[idx][key] = value;
  if (rows[idx].__meta) rows[idx].__meta.modified = todayISO();
  logAction('edit', rows[idx].ID||'(без ID)', `${key}: "${value}"`);
  const sheet = currentSheet === 'active' ? 'ATM' : 'ZAP';
  persistRow(rows[idx], sheet);
}

function updateCell(idx, key, value) {
  const rows = sheets[currentSheet];
  if (!rows[idx]) return;
  const old = rows[idx][key];
  rows[idx][key] = value;
  if (rows[idx].__meta) rows[idx].__meta.modified = todayISO();
  logAction('edit', rows[idx].ID||'(без ID)', `${key}: "${old}" → "${value}"`);
  const _sheet = currentSheet === 'active' ? 'ATM' : 'ZAP';
  persistRow(rows[idx], _sheet);
  render();
}

function updateCellOrg(idx, value) {
  const rows = sheets[currentSheet];
  if (!rows[idx]) return;
  rows[idx]['Org'] = value;
  if (rows[idx].__meta) rows[idx].__meta.modified = todayISO();
  if (/^ТВБВ/i.test(String(value).trim()) && !rows[idx]['Канал']) {
    rows[idx]['Канал'] = 'ТВБВ';
    persistRow(rows[idx], currentSheet === 'active' ? 'ATM' : 'ZAP');
    render();
  } else {
    refreshRow(idx);
  }
}

function refreshRow(idx) {
  const tbody = document.querySelector('#tableWrap tbody');
  if (!tbody) { updateSummary(); return; }
  const visIdx = getFilteredIndices().indexOf(idx);
  const tr = tbody.children[visIdx];
  if (!tr) { updateSummary(); return; }
  const rows = sheets[currentSheet];
  const row = rows[idx];
  const offset = currentSheet==='active'?1:0;
  const statusColIdx = COLUMNS.findIndex(c => c.type==='status');
  if (statusColIdx>=0 && tr.children[statusColIdx+offset]) {
    tr.children[statusColIdx+offset].innerHTML = computeStatus(row);
  }
  const idColIdx = COLUMNS.findIndex(c => c.key==='ID');
  if (idColIdx>=0) {
    const inp = tr.children[idColIdx+offset]?.querySelector('input');
    if (inp) { const dup=row.ID&&isDuplicateId(row.ID,idx); inp.classList.toggle('dup-warn',!!dup); inp.title=dup?'Дублікат ID':''; }
  }
  const portColIdx = COLUMNS.findIndex(c => c.key==='port');
  if (portColIdx>=0) {
    const inp = tr.children[portColIdx+offset]?.querySelector('input');
    if (inp) { const dup=row.port&&isDuplicatePort(row.port,row.ADRES,idx); inp.classList.toggle('dup-warn',!!dup); inp.title=dup?'Цей порт вже на цій адресі':''; }
  }
  tr.className = [rowClass(row), selected.has(idx)?'row-selected':''].filter(Boolean).join(' ');
  const launchBtn = tr.querySelector('.btn-launch');
  if (launchBtn) { const ready=isReady(row); launchBtn.disabled=!ready; launchBtn.title=ready?'Перенести в ZAP':'Заповніть всі галочки (включно ТМК), Канал та Date of sending SLO'; }
  updateSummary();
}

function generateTempId(type) {
  const prefix = type === 'IPT' ? 'K' : 'A';
  const existing = new Set([...sheets.active, ...sheets.zap].map(r => r.ID));
  let n = 1;
  while (n <= 9999999) {
    const candidate = prefix + String(n).padStart(7, '0');
    if (!existing.has(candidate)) return candidate;
    n++;
  }
  return prefix + Date.now().toString().slice(-7);
}

function createNewRow(type) {
  closeModal();
  const tempId = generateTempId(type);
  const empty = { __meta:{ created:todayISO(), modified:todayISO(), launchedAt:null }, _type: type };
  COLUMNS.forEach(c => {
    if (c.type==='check'||c.type==='check-atm'||c.type==='check-ipt') empty[c.key]=false;
    else if (c.type==='date'&&c.today) empty[c.key]=todayISO();
    else if (c.type==='typebadge') return;
    else if (c.key==='ID') empty[c.key]=tempId;
    else empty[c.key]='';
  });
  sheets[currentSheet].push(empty);
  logAction('add', tempId, `новий ${type} · тимчасовий ID`);
  persistRow(empty, currentSheet === 'active' ? 'ATM' : 'ZAP');
  render(); updateUI();
}

function duplicateRow(idx) {
  const rows = sheets[currentSheet];
  if (!rows[idx]) return;
  const copy = JSON.parse(JSON.stringify(rows[idx]));
  copy.ID = '';
  copy._sbId = null;
  copy.__meta = { created:todayISO(), modified:todayISO(), launchedAt:null };
  rows.splice(idx+1,0,copy);
  logAction('duplicate', rows[idx].ID||'(без ID)', 'дублікат створено');
  persistRow(copy, currentSheet === 'active' ? 'ATM' : 'ZAP');
  render();
}

async function deleteRow(idx) {
  if (!confirm('Видалити рядок?')) return;
  const rows = sheets[currentSheet];
  const row = rows[idx];
  if (!row) return;
  const sbId = row._sbId;
  rows.splice(idx,1);
  selected.delete(idx);
  logAction('delete', row.ID||'(без ID)', `видалено з ${currentSheet}`);
  try {
    if (sbId != null) await sbDeleteById(sbId);
  } catch(e) { console.error('deleteRow error:', e); alert('Не вдалося видалити з бази: ' + e.message); }
  render(); updateUI();
}

async function launchRow(idx) {
  const row = sheets.active[idx];
  if (!row||!isReady(row)) return;
  if (!row.__meta) row.__meta = {};
  row.__meta.launchedAt = todayISO();
  const atmId = row.ID;
  sheets.zap.push(row);
  sheets.active.splice(idx,1);
  selected.delete(idx);
  logAction('launch', atmId||'(без ID)', '→ ZAP запущено');
  await persistRow(row, 'ZAP');
  document.getElementById('dbStatus').textContent =
    '● Збережено · ATM: ' + sheets.active.length + ' · ZAP: ' + sheets.zap.length +
    ' · ' + new Date().toLocaleTimeString('uk-UA');
  render(); updateUI();
}

async function returnRow(idx) {
  const row = sheets.zap[idx];
  if (!row) return;
  if (row.__meta) row.__meta.launchedAt = null;
  const atmId = row.ID;
  sheets.active.push(row);
  sheets.zap.splice(idx,1);
  logAction('return', atmId||'(без ID)', 'ZAP → Активні');
  await persistRow(row, 'ATM');
  document.getElementById('dbStatus').textContent =
    '● Збережено · ATM: ' + sheets.active.length + ' · ZAP: ' + sheets.zap.length +
    ' · ' + new Date().toLocaleTimeString('uk-UA');
  render(); updateUI();
}

// ===== BULK =====
function toggleSelect(idx, on) { if (on) selected.add(idx); else selected.delete(idx); render(); }
function toggleAll(on) { selected.clear(); if (on) getFilteredIndices().forEach(i=>selected.add(i)); render(); }
function clearSelection() { selected.clear(); render(); }
function updateBulkBar() {
  document.getElementById('bulkCount').textContent = `${selected.size} вибрано`;
  document.getElementById('bulkBar').classList.toggle('show', selected.size>0 && currentSheet==='active');
}
async function bulkLaunch() {
  const idxs = [...selected].sort((a,b)=>b-a);
  let count = 0;
  idxs.forEach(i => {
    const row = sheets.active[i];
    if (row&&isReady(row)) {
      if (!row.__meta) row.__meta={};
      row.__meta.launchedAt = todayISO();
      sheets.zap.push(row);
      sheets.active.splice(i,1);
      count++;
    }
  });
  logAction('bulk-launch', '', `${count} рядків → ZAP`);
  await saveAllToServer();
  selected.clear(); render(); updateUI();
  if (count===0) alert('Жоден з вибраних не готовий до запуску');
}
function bulkCheck(field) {
  [...selected].forEach(i => {
    if (sheets.active[i]) {
      sheets.active[i][field] = true;
      if (sheets.active[i].__meta) sheets.active[i].__meta.modified = todayISO();
    }
  });
  logAction('bulk-check', '', `${field}=true для ${selected.size} рядків`);
  saveSheetToDB('active').catch(()=>{});
  render();
}

function bulkCheckConditional(field) {
  // Ліміти — тільки для ATM; СБОН — тільки для ІПТ
  let count = 0;
  [...selected].forEach(i => {
    const row = sheets.active[i];
    if (!row) return;
    const isIPT = row['_type'] === 'IPT';
    if (field === 'Limi' && isIPT) return;
    if (field === 'СБОН' && !isIPT) return;
    row[field] = true;
    if (row.__meta) row.__meta.modified = todayISO();
    count++;
  });
  logAction('bulk-check', '', `${field}=true для ${count} рядків`);
  saveSheetToDB('active').catch(()=>{});
  render();
}
async function bulkDelete() {
  if (!confirm(`Видалити ${selected.size} рядків?`)) return;
  const sbIds = [...selected].map(i => sheets.active[i]?._sbId).filter(v => v != null);
  [...selected].sort((a,b)=>b-a).forEach(i=>sheets.active.splice(i,1));
  logAction('bulk-delete', '', `${selected.size} рядків видалено`);
  try {
    for (const sbId of sbIds) await sbDeleteById(sbId);
  } catch(e) { console.error('bulkDelete error:', e); alert('Помилка видалення з бази: ' + e.message); }
  selected.clear(); render(); updateUI();
}

function updateSummary() {
  const sm = document.getElementById('summary');

  sm.style.display='flex';
  // Визначаємо вибраний FIO-фільтр

  const activeRows = fioFilter

    : sheets.active;
  const zapRows = fioFilter
    ? sheets.zap.filter(r => r.FIO === fioFilter)
    : sheets.zap;
  const total = activeRows.length; // тільки в роботі (без ZAP)
  const readyRows = activeRows.filter(isReady);

  const soon = activeRows.filter(isSoon).length;
  const launched = zapRows.length;
  const scopeLabel = fioFilter ? ` · ${fioFilter}` : '';
  sm.innerHTML = `

function getWaitingPort() { return sheets.active.filter(r => r['Date Start'] && !r.port); }
function getMonthOptions() {
  // Збираємо всі унікальні місяці з Date Start (ATM + ZAP)
  const months = new Set();
  [...sheets.active, ...sheets.zap].forEach(r => {
    const d = r['Date Start'];
    if (d && d.match(/^\d{4}-\d{2}/)) months.add(d.slice(0,7));
  });
  const sorted = [...months].sort().reverse();
  const cur = todayISO().slice(0,7);
  if (!months.has(cur)) sorted.unshift(cur);
  return sorted;
}

// ===== Картка редагування рядка =====
const CARD_GROUPS = [
  { title:'Опис', keys:['_type','ID','ADRES','SD','Org','Old ATM','FIO'] },
  { title:'Етапи', keys:['dogovir','DIS','BEC','Limi','ТМК','Сигналізація','СБОН'] },
  { title:'Технічні', keys:['Канал','port'] },
  { title:'Дати', keys:['date pog','Date SLO','Date Start'] },
  { title:'Примітка', keys:['Note'] },
];
function cardFieldHtml(col, row) {
  const v = row[col.key] ?? '';
  const dk = `data-key="${col.key}"`;
  if (col.key==='_type' || col.type==='typebadge') {
    return `<label>${col.label}<select ${dk}><option value="ATM"${v==='ATM'?' selected':''}>ATM</option><option value="IPT"${v==='IPT'?' selected':''}>IPT</option></select></label>`;
  }
  if (col.type==='select') {
    const opts = (col.options||[]).map(o=>`<option value="${o}"${String(v)===o?' selected':''}>${o||'—'}</option>`).join('');
    return `<label>${col.label}<select ${dk}>${opts}</select></label>`;
  }
  if (col.type==='check' || col.type==='check-atm' || col.type==='check-ipt') {
    return `<label class="card-check"><input type="checkbox" ${dk} ${v===true?'checked':''}> ${col.label}</label>`;
  }
  if (col.type==='note') {
    return `<label>${col.label}<textarea ${dk} rows="2">${String(v)}</textarea></label>`;
  }
  return `<label>${col.label}<input type="text" ${dk} value="${String(v).replace(/"/g,'&quot;')}"></label>`;
}
function editCard(idx) {
  const row = sheets[currentSheet][idx];
  if (!row) return;
  const byKey = {}; COLUMNS.forEach(c => byKey[c.key] = c);
  let html = `<div class="card-head"><h3>Картка: ${row.ID||'(новий запис)'}</h3></div>`;
  CARD_GROUPS.forEach(g => {
    html += `<div class="card-group"><div class="card-group-title">${g.title}</div><div class="card-fields">`;
    g.keys.forEach(k => { const col = byKey[k]; if (col) html += cardFieldHtml(col, row); });
    html += `</div></div>`;
  });
  html += `<div class="card-actions"><button class="btn" onclick="closeModal()">Закрити</button><button class="btn btn-primary" onclick="saveCard(${idx})">Зберегти</button></div>`;
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modal').classList.add('show');
}
function saveCard(idx) {
  const row = sheets[currentSheet][idx];
  if (!row) { closeModal(); return; }
  document.querySelectorAll('#modalContent [data-key]').forEach(el => {
    const k = el.getAttribute('data-key');
    if (el.type==='checkbox') row[k] = el.checked;
    else row[k] = el.value;
  });
  if (row.__meta) row.__meta.modified = todayISO();
  persistRow(row, currentSheet==='active' ? 'ATM' : 'ZAP');
  render();
  closeModal();
}

// ===== EXPORT EXCEL =====
function exportExcel() {
  const wb = XLSX.utils.book_new();
  const headers = COLUMNS.map(c=>c.key);
  const fullHeaders = [...headers,'__created','__modified','__launched'];
  const buildSheet = (rows,includeMeta) => rows.map(r => {
    const o={};
    COLUMNS.forEach(col => {
      let v=r[col.key];
      if (col.type==='check') v=v?1:'';
      else if (col.type==='date') v=fmtDateUk(v);
      else if (col.type==='status') v=stripHtml(computeStatus(r));
      else if (col.type==='note') v=v||'';
      o[col.key]=v;
    });
    if (includeMeta) {
      o['__created']=fmtDateUk(r.__meta?.created);
      o['__modified']=fmtDateUk(r.__meta?.modified);
      if (r.__meta?.launchedAt) o['__launched']=fmtDateUk(r.__meta.launchedAt);
    }
    return o;
  });
  if (sheets.active.length>0) XLSX.utils.book_append_sheet(wb,
    XLSX.utils.json_to_sheet(buildSheet(sheets.active,true),{header:fullHeaders}),'ATM');
  if (sheets.zap.length>0) XLSX.utils.book_append_sheet(wb,
    XLSX.utils.json_to_sheet(buildSheet(sheets.zap,true),{header:fullHeaders}),'ZAP');
  // Лист журналу — тягнемо з Supabase
  sbGet('atm_log', 'order=id.desc&limit=5000').then(logs => {
    const logRows = logs.map(e=>({'Час':e.log_time||'','Логін':e.login||'','ПІБ':e.user_fio||'','Дія':e.action||'','ATM ID':e.atm_id||'','Деталі':e.details||'',"Комп'ютер":e.computer||'','Браузер':e.browser||''}));
    if (logRows.length>0) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(logRows), 'Журнал');
  }).catch(()=>{}).finally(() => {
    if (wb.SheetNames.length===0) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet([],{header:headers}), 'ATM');
    XLSX.writeFile(wb, `atm_export_${todayISO()}.xlsx`);
    logAction('export','—',`ATM=${sheets.active.length}, ZAP=${sheets.zap.length}`);
  });
}

  const byFio={};
  [...sheets.active,...sheets.zap].forEach(r=>{
    const f=r.FIO||'(не вказано)';
    if (!byFio[f]) byFio[f]={total:0,launched:0,pending:0};
    byFio[f].total++;
    if (sheets.zap.includes(r)) byFio[f].launched++;
    else if (isPending(r)) byFio[f].pending++;
  });
  const rows=[['FIO','Всього','Запущено','В роботі']];
  Object.entries(byFio).forEach(([f,s])=>rows.push([f,s.total,s.launched,s.pending]));
  const csv=rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`report_${todayISO()}.csv`; a.click();
}

// ===== HOTKEYS =====
function handleHotkey(e) {
  if ((e.ctrlKey||e.metaKey)&&e.key==='s') { e.preventDefault(); exportExcel(); return; }
  if ((e.ctrlKey||e.metaKey)&&e.key==='d'&&currentSheet==='active') {
    const tr=e.target.closest('tr');
    if (tr) {
      e.preventDefault();
      const tbody=tr.parentElement;
      const visIdx=[...tbody.children].indexOf(tr);
      const realIdx=getFilteredIndices()[visIdx];
      if (realIdx!==undefined) duplicateRow(realIdx);
    }
  }
}

// ===== PROFILES (admin) =====
async function showProfiles() {
  if (currentUser !== 'PavelkoOV') return;
  await loadUserSettings();

  const rows = Object.entries(USERS).map(([login, info]) => {
    const s = userSettings[login] || {};
    const hasPwd = !!s.pwd_hash;
    const bypass = !!s.bypass;
    const statusHtml = bypass
      ? '<span style="color:var(--ok);font-size:11px">✓ Вхід без пароля</span>'
      : hasPwd
        ? '<span style="color:var(--info);font-size:11px">🔒 Пароль встановлено</span>'
        : '<span style="color:#b45309;font-size:11px">⚠ Пароль не встановлено</span>';
    return `
      <div class="profile-card">
        <h4>${escapeHtml(info.full)}</h4>
        <div class="profile-login">${login}</div>
        <div style="margin-bottom:8px">${statusHtml}</div>
        <input class="profile-input" id="pwd_${login}" type="password" placeholder="Новий пароль">
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          <button class="profile-btn profile-btn-set" onclick="adminSetPwd('${login}')">💾 Зберегти пароль</button>
          ${bypass
            ? `<button class="profile-btn profile-btn-revoke" onclick="adminSetBypass('${login}',false)">🔒 Скасувати bypass</button>`
            : `<button class="profile-btn profile-btn-bypass" onclick="adminSetBypass('${login}',true)">🔓 Вхід без пароля</button>`
          }
          ${hasPwd ? `<button class="profile-btn" style="background:#ef4444;color:#fff" onclick="adminClearPwd('${login}')">✕ Видалити пароль</button>` : ''}
        </div>
      </div>`;
  }).join('');

  document.getElementById('modalContent').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="margin:0">👥 Управління користувачами</h2>
      <button class="btn btn-primary" onclick="closeModal()">Закрити</button>
    </div>
    <div class="profiles-grid">${rows}</div>`;
  document.getElementById('modal').classList.add('show');
}

async function adminSetPwd(login) {
  const pwd = document.getElementById('pwd_' + login)?.value?.trim();
  if (!pwd) { alert('Введіть пароль'); return; }
  if (pwd.length < 4) { alert('Мінімум 4 символи'); return; }
  const hash = await hashPwd(pwd);
  await sbUpsertSetting(login, { pwd_hash: hash, bypass: false });
  document.getElementById('pwd_' + login).value = '';
  alert(`✅ Пароль для ${login} встановлено`);
  showProfiles();
}

async function adminSetBypass(login, bypass) {
  const s = userSettings[login] || {};
  await sbUpsertSetting(login, { pwd_hash: s.pwd_hash||'', bypass });
  logAction('admin', login, bypass ? 'Bypass увімкнено' : 'Bypass вимкнено');
  alert(bypass ? `✅ ${login} може входити без пароля` : `🔒 Bypass скасовано для ${login}`);
  showProfiles();
}

async function adminClearPwd(login) {
  if (!confirm(`Видалити пароль для ${login}?`)) return;
  await sbUpsertSetting(login, { pwd_hash: '', bypass: false });
  logAction('admin', login, 'Пароль видалено');
  showProfiles();
}

async function sbUpsertSetting(login, data) {
  // Спочатку пробуємо UPDATE
  const existing = await sbGet('atm_settings', `login=eq.${login}`);
  if (existing.length > 0) {
    await fetch(`${SB_URL}/rest/v1/atm_settings?login=eq.${login}`, {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer '+SB_KEY,
                 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(data)
    });
  } else {
    await sbPost('atm_settings', { login, ...data });
  }
  await loadUserSettings();
}

// ===== ЗМІНА ПАРОЛЯ (для звичайних користувачів) =====
async function showChangePwd() {
  const login = currentUser;
  const info = USERS[login];
  const s = userSettings[login] || {};
  const hasPwd = !!s.pwd_hash;

  document.getElementById('modalContent').innerHTML = `
    <div style="max-width:380px;margin:0 auto">
      <h2 style="margin:0 0 4px 0">🔑 Зміна пароля</h2>
      <p style="color:var(--text-muted);font-size:13px;margin:0 0 20px 0">${escapeHtml(info.full)}</p>
      ${hasPwd ? `
      <div class="login-field">
        <label>Поточний пароль</label>
        <input type="password" id="cpOldPwd" class="profile-input" placeholder="Введіть поточний пароль">
      </div>` : `
      <div style="background:#f0fdf4;border:1px solid #86efac;border-radius:6px;padding:10px 14px;font-size:12px;color:var(--ok);margin-bottom:16px">
        ℹ️ Пароль ще не встановлено — задайте новий
      </div>`}
      <div class="login-field">
        <label>Новий пароль</label>
        <input type="password" id="cpNewPwd" class="profile-input" placeholder="Мінімум 4 символи">
      </div>
      <div class="login-field">
        <label>Повторіть новий пароль</label>
        <input type="password" id="cpNewPwd2" class="profile-input" placeholder="Повторіть пароль">
      </div>
      <div id="cpError" style="display:none;background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;border-radius:6px;padding:9px 14px;font-size:12px;margin-bottom:12px"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
        <button class="btn" onclick="closeModal()">Скасувати</button>
        <button class="btn btn-primary" onclick="doChangePwd()">💾 Зберегти пароль</button>
      </div>
    </div>`;
  document.getElementById('modal').classList.add('show');
  // Фокус на перше поле
  setTimeout(() => {
    const f = document.getElementById('cpOldPwd') || document.getElementById('cpNewPwd');
    if (f) f.focus();
  }, 100);
}

async function doChangePwd() {
  const login = currentUser;
  const s = userSettings[login] || {};
  const hasPwd = !!s.pwd_hash;
  const errEl = document.getElementById('cpError');
  const newPwd = document.getElementById('cpNewPwd')?.value || '';
  const newPwd2 = document.getElementById('cpNewPwd2')?.value || '';

  const showErr = (msg) => {
    errEl.textContent = msg;
    errEl.style.display = 'block';
  };

  // Перевіряємо поточний пароль
  if (hasPwd) {
    const oldPwd = document.getElementById('cpOldPwd')?.value || '';
    if (!oldPwd) { showErr('Введіть поточний пароль'); return; }
    const oldHash = await hashPwd(oldPwd);
    if (oldHash !== s.pwd_hash) { showErr('Поточний пароль невірний'); return; }
  }

  // Перевіряємо новий пароль
  if (!newPwd) { showErr('Введіть новий пароль'); return; }
  if (newPwd.length < 4) { showErr('Мінімум 4 символи'); return; }
  if (newPwd !== newPwd2) { showErr('Паролі не співпадають'); return; }

  // Зберігаємо
  const newHash = await hashPwd(newPwd);
  await sbUpsertSetting(login, { pwd_hash: newHash, bypass: false });
  logAction('change-pwd', '—', 'Пароль змінено', login);
  closeModal();
  // Показуємо підтвердження
  const btn = document.getElementById('changePwdBtn');
  if (btn) {
    const orig = btn.textContent;
    btn.textContent = '✅ Пароль змінено';
    btn.style.background = 'rgba(21,128,61,.3)';
    setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 3000);
  }
}

// ===== UTILS =====
function escapeHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escapeAttr(s){return String(s??'').replace(/"/g,'&quot;');}
function stripHtml(s){const d=document.createElement('div');d.innerHTML=s;return d.textContent||'';}

(async function preloadData() {
  const ok = await initDB();
  if (ok) {
    await loadUserSettings();
    // Перевіряємо збережену сесію
    const savedLogin = localStorage.getItem('atm_session');
    if (savedLogin && USERS[savedLogin]) {
      // Відновлюємо сесію без повторного логіну
      await loginSuccess(savedLogin, true);
    } else {
      // Показуємо сторінку логіну
      document.getElementById('loginPage').style.display = 'flex';
    }
  } else {
    loadSeedData();
    rebuildFilters(); render(); updateUI();
    document.getElementById('loginPage').style.display = 'flex';
  }
})();
